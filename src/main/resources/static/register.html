<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Personal Notes Manager</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <h1>Register</h1>
        <p style="margin-bottom: 1rem; color: #666;">Create one account, then login and manage your personal notes.</p>

        <div id="message" style="display: none; margin-bottom: 1rem; padding: 0.75rem; border-radius: 5px;"></div>

        <form id="registerForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>

        <p style="margin-top: 1rem;">
            <a href="/login.html" style="color: #667eea;">Already have account? Login</a>
        </p>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const messageBox = document.getElementById('message');

        function showMessage(message, isError) {
            messageBox.textContent = message;
            messageBox.style.display = 'block';
            messageBox.style.backgroundColor = isError ? '#fed7d7' : '#c6f6d5';
            messageBox.style.color = isError ? '#c53030' : '#22543d';
        }

        registerForm.addEventListener('submit', async function (event) {
            event.preventDefault();

            const user = {
                username: document.getElementById('username').value.trim(),
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(user)
                });

                const result = await response.json();
                showMessage(result.message || 'Registration failed.', !response.ok || !result.success);

                if (response.ok && result.success) {
                    registerForm.reset();
                    setTimeout(function () {
                        window.location.href = '/login.html';
                    }, 800);
                }
            } catch (error) {
                showMessage('Unable to connect to the server.', true);
            }
        });
    </script>
</body>
</html>
